name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            args: --bundles msi
          - os: macos-latest
            args: --bundles dmg
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch / build STT sidecars
        run: bash apps/tauri/scripts/fetch-sidecars.sh

      - name: Smoke test sidecars
        shell: bash
        run: |
          SIDECARS=apps/tauri/src-tauri/resources/sidecars
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            "$SIDECARS/whisper.exe" --help
            "$SIDECARS/moss-transcribe.exe" version
            "$SIDECARS/ffmpeg.exe" -f lavfi -i "sine=frequency=1000:duration=1" -ar 16000 -ac 1 -c:a pcm_s16le "$RUNNER_TEMP/tone.wav"
          else
            "$SIDECARS/whisper" --help
            "$SIDECARS/moss-transcribe" version
            "$SIDECARS/ffmpeg" -f lavfi -i "sine=frequency=1000:duration=1" -ar 16000 -ac 1 -c:a pcm_s16le "$RUNNER_TEMP/tone.wav"
          fi
          test -s "$RUNNER_TEMP/tone.wav" && echo "ffmpeg conversion OK"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: apps/tauri
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "Lynse ${{ github.ref_name }}"
          releaseBody: "Lynse desktop — Windows (msi) and macOS (dmg)."
          releaseDraft: false
          prerelease: false
          includeRelease: true
